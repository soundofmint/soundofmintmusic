<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound of Mint - Electro-Ethnic Live Act</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black:#080808;
  --card:#161616;
  --border:#242424;
  --text:#cccccc;
  --white:#f0ece4;
  --muted:#3a3a3a;
  --accent:#c8b89a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--black);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

/* NAV */

nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 48px;
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.05);
  z-index:100;
}

.nav-logo{
  font-family:'Syne';
  font-weight:800;
  font-size:12px;
  letter-spacing:.18em;
  color:var(--white);
}

.nav-links{
  display:flex;
  gap:36px;
  list-style:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.nav-links a{
  color:#999;
  text-decoration:none;
  font-size:13px;
}

.nav-links a:hover{color:white;}

.nav-cta{
  background:white;
  color:black;
  border:none;
  padding:10px 22px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}

/* HERO */

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 24px;
}

.hero-logo{
  max-width:420px;
  width:80%;
  margin-bottom:40px;
}

.service-tag{
  font-size:10px;
  letter-spacing:.2em;
  color:var(--accent);
}

/* SECTION */

section{padding:100px 48px;}

.section-label{
  text-align:center;
  margin-bottom:24px;
  font-size:11px;
  letter-spacing:.22em;
  color:#666;
}

/* CARD */

.service-card{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
}

.service-content{
  padding:48px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  max-width:600px;
}

.service-content p{
  line-height:1.7;
  color:var(--white);
}

/* VIDEO */

.music-video-wrap{
  padding:24px;
  display:flex;
}

.video-frame{
  width:100%;
  height:100%;
  min-height:420px;
  background:black;
  border-radius:6px;
  overflow:hidden;
}

.video-frame iframe{
  width:100%;
  height:100%;
  border:0;
}

/* LOGOS */

.logos-row{
  max-width:1100px;
  margin:40px auto 0;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:64px;
  flex-wrap:wrap;
}

.logo-item{
  height:60px;
  opacity:.7;
  filter:grayscale(100%);
  transition:.3s;
}

.logo-item:hover{
  opacity:1;
  filter:none;
  transform:scale(1.07);
}

/* FOOTER */

footer{
  margin-top:80px;
  padding:60px;
  border-top:1px solid var(--border);
  text-align:center;
  font-size:12px;
  color:#777;
}

/* MOBILE */

@media(max-width:900px){

  section{padding:64px 20px;}

  .service-card{
    grid-template-columns:1fr;
  }

  .service-content{
    padding:32px 20px;
  }

  .music-video-wrap{
    padding:0 20px 20px;
  }

  .video-frame{
    aspect-ratio:16/9;
    min-height:auto;
    border-radius:10px;
  }

  .logos-row{
    gap:28px;
  }

  .logo-item{
    height:40px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Sound of Mint</div>
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#about">Music</a></li>
  </ul>
  <a href="mailto:contact@soundofmintmusic.com">
    <button class="nav-cta">Get in touch</button>
  </a>
</nav>

<section class="hero" id="home">
  <img src="logo.png" class="hero-logo">
  <div class="service-tag">Electro-Ethnic Live Act</div>
</section>

<section id="about">
  <div class="section-label">Music</div>

  <div class="service-card">

    <div class="service-content">
      <div class="service-tag">PURE by We Love Buzz</div>
      <p>
        Sound of Mint unfolds as a deeply personal musical journey blending electronic textures with organic instrumentation and global influences.
      </p>
    </div>

    <div class="music-video-wrap">
      <div class="video-frame">
        <iframe src="https://www.youtube.com/embed/8LpdvFeekeY" allowfullscreen></iframe>
      </div>
    </div>

  </div>

  <!-- LOGOS OUTSIDE CARD -->

  <div class="logos-row">
    <a href="https://music.apple.com"><img src="04.png" class="logo-item"></a>
    <a href="https://soundofmintmusic.bandcamp.com"><img src="05.png" class="logo-item"></a>
    <a href="https://beatport.com"><img src="01.png" class="logo-item"></a>
    <a href="https://soundcloud.com/soundofmint"><img src="02.png" class="logo-item"></a>
    <a href="https://spotify.com"><img src="03.png" class="logo-item"></a>
  </div>

</section>

<footer>
  © 2026 Sound of Mint
</footer>

</body>
</html>
